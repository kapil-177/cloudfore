services:
  - type: web
    name: cloudfore-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: cloudfore
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CLIENT_URL
        sync: false
      - key: DEMO_EMAIL
        value: demo@cloudfore.dev
      - key: DEMO_PASSWORD
        sync: false
      - key: DEMO_NAME
        value: Cloud Admin
