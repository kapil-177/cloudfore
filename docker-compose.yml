version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: cloudfore-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    container_name: cloudfore-server
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
    container_name: cloudfore-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  mongo_data:
